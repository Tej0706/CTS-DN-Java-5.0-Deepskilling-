<h1>{{ portalName }}</h1>

<p>Manage your courses, profile and enrollments easily.</p>

<button [disabled]="!isPortalActive"
        (click)="onEnrollClick()">
  Enroll Now
</button>

<p>{{ message }}</p>

<br>

<input
  type="text"
  [(ngModel)]="searchTerm"
  placeholder="Search courses">

<p>Searching for: {{ searchTerm }}</p>

<hr>

<app-course-summary-widget></app-course-summary-widget>

<hr>

<div>
  <p>Courses Available: {{ totalCourses }}</p>
  <p>Enrolled: 3</p>
  <p>GPA: 3.8</p>
</div>
